data:
  #name: pdbbind                                  # pl or pdbbind
  #path: ../CrossDocked2020/data/newer_pdbbind2020               # ./data/crossdocked_v1.1_rmsd1.0_pocket10 or ./data/pdbbind2020_r10
  #split: ../CrossDocked2020/data/newer_pdbbind2020/newer_pdbbind2020_split.pt             # ./data/crossdocked_pocket10_pose_split.pt or ./data/pdbbind2020_r10_split.pt
  
  #name: pdbbind 
  #path: ../BindingNetv2_High/data/BindingNetv2_High               # ./data/crossdocked_v1.1_rmsd1.0_pocket10 or ./data/pdbbind2020_r10
  #split: ../BindingNetv2_High/data/BindingNetv2_High/BindingNetv2_High_split.pt             # ./data/crossdocked_pocket10_pose_split.pt or ./data/pdbbind2020_r10_split.pt

  

  name: pdbbind                                  # pl or pdbbind
  path: ../CrossDocked2020/data/mixed_dataset               # ./data/crossdocked_v1.1_rmsd1.0_pocket10 or ./data/pdbbind2020_r10
  split: ../CrossDocked2020/data/mixed_dataset/mixed_dataset_split.pt             # ./data/crossdocked_pocket10_pose_split.pt or ./data/pdbbind2020_r10_split.pt
  
  


  transform:
    ligand_atom_mode: add_aromatic #芳香原子
    random_rot: False #不随机旋转

  
  protein_max_atom_num: 1184
  ligand_max_atom_num: 224

model:
  model_mode: equiformer # escn, equiformer, egnn
  #euiformer: False
  #escn: False
  diffusion_mode: CM # CM(consistency model), DDPM # newly add

  model_mean_type: C0  # ['noise', 'C0'] #默认是C0,nosie模式要探索一下，看看效果, noise效果不好
  beta_schedule: sigmoid
  beta_start: 1.e-7
  beta_end: 2.e-3
  v_beta_schedule: cosine
  v_beta_s: 0.01
  num_diffusion_timesteps: 1000 #这个成了参数一部分，改了就不能加载模型训练了
  loss_v_weight: 100.
  loss_exp_weight: 1.
  sample_time_method: symmetric  # ['importance', 'symmetric']
  affinity_with_diffusion: False  # affinity decrease with time
  use_classifier_guide: True
  time_emb_dim: 0
  time_emb_mode: simple
  center_pos_mode: protein

  node_indicator: True
  model_type: uni_o2
  num_blocks: 1
  num_layers: 9
  hidden_dim: 128 #512这里的参数太大了 默认是128,16用于equiformer
  n_heads: 16
  edge_feat_dim: 340  # edge type feat, #4,8,20, 改键类型数量后，需要相应地改配体文件中的键嵌入维度对应4/88/340, 这个参数影响equifromer模型
  
  num_r_gaussian: 20
  knn: 32    #默认32  
  num_node_types: 20 #
  act_fn: relu
  norm: True
  cutoff_mode: knn  # [radius, none]
  ew_net_type: global  # [r, m, none]
  num_x2h: 1
  num_h2x: 1
  r_max: 10.
  x2h_out_fc: False
  sync_twoup: True #对接，则把这个设置为True，有效果，即将学习到节点的嵌入作为节点坐标的输入，进行训练模型,但对于分子生成来说，就不一定了，因此需要节点嵌入用于预测原子类型
  pred_exp_from_all: False

train:
  seed: 2021
  batch_size: 16 #批量为1，用于equiformer,如果批量太大，可能导致模型跑不动，尤其是在多卡并行的情况下
  num_workers: 8 #
  n_acc_batch: 1
  max_iters: 10000000
  val_freq: 1000
  pos_noise_std: 0.1
  max_grad_norm: 2.0 #1.5,默认是8
  bond_loss_weight: 1.0
  optimizer:
    type: adam
    lr: 1.e-3
    weight_decay: 0
    beta1: 0.95
    beta2: 0.999
  scheduler:
    type: plateau
    factor: 0.95
    patience: 15
    min_lr: 1.e-5



#如果想减少equiformer的GPU资源消耗，需要减少多头注意力的填充维度的长度，不要太大(比如，把一个维度[n,d], 经过多有注意力填充，得到[n, m, d])
equiformer:
  name: equiformer_v2
  batch_size:               8
  use_pbc:                  False  #先使用普通的距离,默认True
  regress_forces:           True
  otf_graph:                True  #是否动态生成计算图，在输入变长的情况下，效果好?确定一下是否影响速度？开启有利于节约内存占用
  max_neighbors:            32
  max_radius:               12.0
  max_num_elements:         200   #17/200

  num_layers:               10 #默认12层,实在不行，就4层, 网络层数量对模型的显存影响不大
  sphere_channels:          8  #默认128
  attn_hidden_channels:     8 #默认64，隐藏层维度      # [64, 96] This determines the hidden size of message passing. Do not necessarily use 96. 
  num_heads:                2               #试试注意力头为1时，看看是否报错，默认是8
  attn_alpha_channels:      8 #默认64              # Not used when `use_s2_act_attn` is True. 
  attn_value_channels:      8
  ffn_hidden_channels:      8  #默认128
  norm_type:                'layer_norm_sh'    # ['rms_norm_sh', 'layer_norm', 'layer_norm_sh']

  lmax_list:                [4]             #这个参数影响隐藏层维度，6表示球坐标函数的阶数。默认是6，这参数非常影响显存占用量，至于批量大小反而没有很大影响
  mmax_list:                [2]             
  grid_resolution:          18              # 默认18，[18, 16, 14, None] For `None`, simply comment this line. 

  num_sphere_samples:       8  #默认128

  edge_channels:              8  #默认128
  use_atom_edge_embedding:    True          #默认是True, 使用边嵌入，目的在于将距离作为注意力权重的一部分，建议不开启将原子嵌入和边距离拼接一起，直接使用边距离更直接
  share_atom_edge_embedding:  False         # If `True`, `use_atom_edge_embedding` must be `True` and the atom edge embedding will be shared across all blocks. 
  use_m_share_rad:            False
  distance_function:          'gaussian'
  num_distance_basis:         4           # not used

  attn_activation:          'silu'
  use_s2_act_attn:          False       # [False, True] Switch between attention after S2 activation or the original EquiformerV1 attention. 
  use_attn_renorm:          True        # Attention re-normalization. Used for ablation study.
  ffn_activation:           'silu'      # ['silu', 'swiglu']
  use_gate_act:             False       # [True, False] Switch between gate activation and S2 activation
  use_grid_mlp:             True        # [False, True] If `True`, use projecting to grids and performing MLPs for FFNs.
  use_sep_s2_act:           True        # Separable S2 activation. Used for ablation study.

  alpha_drop:               0.1         # [0.0, 0.1]
  drop_path_rate:           0.05        # [0.0, 0.05] 
  proj_drop:                0.0

  weight_init:              'uniform'    # ['uniform', 'normal']




