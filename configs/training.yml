  max_radius:               8.0
  max_num_elements:         200

  num_layers:               8 #默认8层
  lmax_list:                [6]             #这个参数影响隐藏层维度，6表示球坐标函数的阶数。默认是6，这参数非常影响显存占用量，至于批量大小反而没有很大影响
