  num_sphere_samples:       16  #默认128

  sphere_channels:          16
  hidden_channels:          16
  edge_channels:            16
  use_grid:                 True
  num_sphere_samples:       16
  distance_function:        'gaussian'
  basis_width_scalar:       1.0
  distance_resolution:      0.02
  show_timing_info:         False